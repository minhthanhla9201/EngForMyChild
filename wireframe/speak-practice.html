<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wireframe — Phát âm: luyện</title>
<!-- Wireframe ĐỘC LẬP, chạy offline: asset trong assets/ cạnh file này. -->
<link href="assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
<link href="assets/vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
<link href="assets/style.css" rel="stylesheet">
<link href="assets/wf-frame.css" rel="stylesheet">
</head>
<body data-screen="speak-practice">

<!-- Thanh điều hướng wireframe (về mục lục + màn trước/sau) — wf-frame.js dựng -->
<div class="wf-bar" id="wf-bar"></div>

<section class="wf-screen" id="speak-practice">
  <div class="wf-label"><i class="bi bi-soundwave"></i> Luyện phát âm — Đọc theo & ghi âm <span class="wf-url">/speak/1/animals/</span></div>
  <div class="wf-frame">
    <div class="wf-nav-kid"></div>
    <main class="container py-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h5 m-0">🎤 🐥 Bi — Động vật</h1>
        <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Đổi</button>
      </div>
      <div class="text-muted small mb-2">Từ 1 / 4</div>
      <div class="card child-card text-center p-4 mb-3">
        <!-- Hình THẬT của từ (app dùng w.image; wireframe minh hoạ bằng emoji) -->
        <div class="mb-2" style="font-size:6rem">🐱</div>
        <div class="fs-2 fw-bold">cat</div>
        <div class="text-muted">/kæt/</div>
        <div class="text-secondary mb-3">con mèo</div>
        <div class="d-flex justify-content-center gap-2 flex-wrap">
          <button class="btn btn-kid"><i class="bi bi-volume-up-fill"></i> Nghe mẫu</button>
          <button class="btn btn-success"><i class="bi bi-mic-fill"></i> Thu giọng</button>
        </div>
        <div class="mt-3"><div class="alert alert-success mb-0">Đã lưu! 👍</div></div>
        <audio controls class="w-100 mt-2"></audio>
      </div>
      <div class="d-flex justify-content-between">
        <button class="btn btn-outline-secondary" disabled><i class="bi bi-chevron-left"></i> Trước</button>
        <button class="btn btn-outline-primary">Từ tiếp theo <i class="bi bi-chevron-right"></i></button>
      </div>
    </main>
  </div>
  <div class="wf-note">Nghe mẫu → Thu giọng (MediaRecorder) → tự gửi lưu Attempt → nghe lại. Chấm điểm tự động ở GĐ 3.</div>
</section>

<script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="assets/wf-frame.js"></script>
</body>
</html>
