<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wireframe — Nhập passcode</title>
<!-- Wireframe ĐỘC LẬP, chạy offline: asset trong assets/ cạnh file này. -->
<link href="assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
<link href="assets/vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
<link href="assets/style.css" rel="stylesheet">
<link href="assets/wf-frame.css" rel="stylesheet">
</head>
<body data-screen="pass-enter">

<!-- Thanh điều hướng wireframe (về mục lục + màn trước/sau) — wf-frame.js dựng -->
<div class="wf-bar" id="wf-bar"></div>

<section class="wf-screen" id="pass-enter">
  <div class="wf-label"><i class="bi bi-shield-lock"></i> Nhập passcode để vào khu quản lý <span class="wf-url">/manage/unlock/</span></div>
  <div class="wf-frame">
    <div class="wf-nav-kid"></div>
    <main class="container py-4">
      <div class="row justify-content-center"><div class="col-md-5">
        <div class="card child-card p-2"><div class="card-body text-center">
          <div class="display-5 mb-2">🔒</div>
          <h1 class="h4 mb-1">Khu quản lý</h1>
          <p class="text-muted small mb-3">Nhập mã passcode của phụ huynh để tiếp tục.</p>
          <form onsubmit="return false">
            <input type="password" class="form-control wf-pass-input mb-3" value="••••" maxlength="6" inputmode="numeric">
            <button class="btn btn-kid w-100"><i class="bi bi-unlock"></i> Mở khoá</button>
          </form>
          <a href="learn-topics.html" class="d-inline-block mt-3 small text-muted"><i class="bi bi-arrow-left"></i> Về khu của bé</a>
        </div></div>
      </div></div>
    </main>
  </div>
  <div class="wf-note">Lớp khoá thứ 2 sau đăng nhập: bé không tự vào nghịch. Mở khoá rồi giữ 30 phút (trượt hạn theo thao tác); sai mã → cảnh báo đỏ.</div>
</section>

<script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="assets/wf-frame.js"></script>
</body>
</html>
