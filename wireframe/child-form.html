<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wireframe — Hồ sơ bé</title>
<!-- Wireframe ĐỘC LẬP, chạy offline: asset trong assets/ cạnh file này. -->
<link href="assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
<link href="assets/vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
<link href="assets/style.css" rel="stylesheet">
<link href="assets/wf-frame.css" rel="stylesheet">
</head>
<body data-screen="child-form">

<!-- Thanh điều hướng wireframe (về mục lục + màn trước/sau) — wf-frame.js dựng -->
<div class="wf-bar" id="wf-bar"></div>

<section class="wf-screen" id="child-form">
  <div class="wf-label"><i class="bi bi-person-plus"></i> Thêm / sửa hồ sơ bé <span class="wf-url">/manage/children/add/</span></div>
  <div class="wf-frame">
    <div class="wf-nav-mng"></div>
    <main class="container py-4">
      <div class="row justify-content-center"><div class="col-md-6">
        <div class="card child-card p-2"><div class="card-body">
          <h1 class="h4 mb-3">➕ Thêm bé</h1>
          <form onsubmit="return false">
            <div class="mb-3"><label class="form-label">Tên bé</label>
              <input class="form-control" placeholder="Tên bé"></div>
            <div class="mb-3"><label class="form-label">Năm sinh</label>
              <input type="number" class="form-control" placeholder="VD: 2018"></div>
            <div class="mb-3"><label class="form-label">Avatar</label>
              <input class="form-control" placeholder="Emoji, vd 🐥"></div>
            <div class="d-flex gap-2">
              <button class="btn btn-kid">Lưu</button>
              <button class="btn btn-outline-secondary">Huỷ</button></div>
          </form>
        </div></div>
      </div></div>
    </main>
  </div>
  <div class="wf-note">Form gọn cho phụ huynh: tên, năm sinh, avatar emoji. owner gán tự động theo người đăng nhập.</div>
</section>

<script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="assets/wf-frame.js"></script>
</body>
</html>
