<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wireframe — Form thêm/sửa từ</title>
<!-- Wireframe ĐỘC LẬP, chạy offline: asset trong assets/ cạnh file này. -->
<link href="assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
<link href="assets/vendor/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
<link href="assets/style.css" rel="stylesheet">
<link href="assets/wf-frame.css" rel="stylesheet">
</head>
<body data-screen="wordform">

<!-- Thanh điều hướng wireframe (về mục lục + màn trước/sau) — wf-frame.js dựng -->
<div class="wf-bar" id="wf-bar"></div>

<section class="wf-screen" id="wordform">
  <div class="wf-label"><i class="bi bi-pencil-square"></i> Form thêm/sửa từ <span class="wf-url">/manage/words/add/</span></div>
  <div class="wf-frame">
    <div class="wf-nav-mng"></div>
    <main class="container py-4">
      <div class="row justify-content-center"><div class="col-md-7">
        <div class="card child-card p-2"><div class="card-body">
          <h1 class="h4 mb-3">➕ Thêm từ</h1>
          <form onsubmit="return false">
            <div class="mb-3"><label class="form-label">Chủ đề</label>
              <select class="form-select"><option>Động vật</option><option>Màu sắc</option></select></div>
            <div class="mb-3"><label class="form-label">Từ (tiếng Anh)</label>
              <input class="form-control" placeholder="VD: cat"></div>
            <div class="mb-3"><label class="form-label">Nghĩa (tiếng Việt)</label>
              <input class="form-control" placeholder="VD: con mèo"></div>
            <div class="mb-3"><label class="form-label">Phiên âm (IPA)</label>
              <input class="form-control" placeholder="Để trống để tự sinh IPA"></div>
            <div class="mb-3"><label class="form-label">Hình minh hoạ</label>
              <input type="file" class="form-control"></div>
            <div class="mb-3"><label class="form-label">Độ khó</label>
              <input type="number" class="form-control" value="1"></div>
            <div class="mb-3"><label class="form-label">Đang dùng</label>
              <select class="form-select"><option>Có</option><option>Không</option></select></div>
            <div class="d-flex gap-2">
              <button class="btn btn-kid">Lưu</button>
              <button class="btn btn-outline-secondary">Huỷ</button></div>
          </form>
        </div></div>
      </div></div>
    </main>
  </div>
  <div class="wf-note">Form gọn, nhãn tiếng Việt. Bỏ trống IPA → hệ thống tự sinh. (Form chủ đề tương tự, ít field hơn.)</div>
</section>

<script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="assets/wf-frame.js"></script>
</body>
</html>
