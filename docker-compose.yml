# Docker Compose — EngForMyChild
# GĐ 0: chỉ service `web` (Django + SQLite). Service `asr` mở ở GĐ 3, `db` (MySQL) khi cần.

services:
  web:
    build: ./web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./web:/app                # mount source để sửa code không cần build lại (dev)
      - sqlite_data:/app          # giữ db.sqlite3 + media qua các lần chạy
    ports:
      - "8000:8000"
    env_file:
      - ./web/.env

  # --- GĐ 3: service chấm phát âm (faster-whisper) ---
