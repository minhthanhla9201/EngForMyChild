# Docker Compose — EngForMyChild
# Cách chạy hiện tại: WEB chạy LOCAL (.\.venv\Scripts\python.exe web\manage.py runserver),
# chỉ SERVICE ASR chạy trong Docker → `docker compose up asr`.
# Web local gọi ASR qua http://localhost:9000 (container publish cổng 9000).

services:
  # --- GĐ 3: service chấm phát âm (faster-whisper) ---
  asr:
    build: ./asr
    volumes:
      - asr_models:/models       # cache model Whisper, không tải lại mỗi lần chạy
    ports:
      - "9002:9000"              # web local gọi qua localhost:9000
    environment:
      ASR_MODEL: base            # cỡ model (tiny/base/small) — base cân bằng cho từ đơn
      ASR_LANG: en
    restart: unless-stopped

  # --- WEB (Django) — đang CHẠY LOCAL nên comment lại. Bật khi muốn chạy web trong Docker. ---
  # web:
  #   build: ./web
  #   command: python manage.py runserver 0.0.0.0:8000
