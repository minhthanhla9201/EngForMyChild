{% extends 'base_kid.html' %}
{% block title %}Khu quản lý — Nhập passcode{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card child-card p-2">
      <div class="card-body text-center">
        <div class="display-5 mb-2">🔒</div>
        <h1 class="h4 mb-1">Khu quản lý</h1>
        <p class="text-muted small mb-3">Nhập passcode của phụ huynh để tiếp tục.</p>
        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">
          <input type="password" name="passcode" class="form-control passcode-input mb-2"
                 inputmode="numeric" autocomplete="off" autofocus maxlength="6">
          {% for err in form.passcode.errors %}<div class="text-danger small mb-2">{{ err }}</div>{% endfor %}
          <button type="submit" class="btn btn-kid w-100"><i class="bi bi-unlock"></i> Mở khoá</button>
        </form>
        <a href="{% url 'accounts:home' %}" class="d-inline-block mt-3 small text-muted">
          <i class="bi bi-arrow-left"></i> Về khu của bé
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
