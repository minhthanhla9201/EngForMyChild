{% extends 'base_manage.html' %}
{% block title %}Đổi passcode{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card child-card p-2">
      <div class="card-body">
        <h1 class="h4 mb-3">🔑 Đổi passcode</h1>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% for err in field.errors %}<div class="text-danger small">{{ err }}</div>{% endfor %}
          </div>
          {% endfor %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-kid">Lưu</button>
            <a href="{% url 'accounts:dashboard' %}" class="btn btn-outline-secondary">Huỷ</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
