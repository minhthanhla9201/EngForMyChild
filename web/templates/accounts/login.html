{% extends 'base.html' %}
{% block title %}Đăng nhập — Phụ huynh{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card child-card p-2">
      <div class="card-body">
        <h1 class="h4 text-center mb-3">👋 Phụ huynh đăng nhập</h1>
        {% if form.errors %}
          <div class="alert alert-danger">Tên đăng nhập hoặc mật khẩu chưa đúng.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
          <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-kid w-100">Đăng nhập</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
