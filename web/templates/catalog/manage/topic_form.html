{% extends 'base.html' %}
{% block title %}{% if is_add %}Thêm chủ đề{% else %}Sửa chủ đề{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card child-card p-2">
      <div class="card-body">
        <h1 class="h4 mb-3">{% if is_add %}➕ Thêm chủ đề{% else %}✏️ Sửa chủ đề{% endif %}</h1>
        <form method="post">
          {% csrf_token %}
          {% include 'catalog/manage/_form_fields.html' %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-kid">Lưu</button>
            <a href="{% url 'catalog:topic_manage' %}" class="btn btn-outline-secondary">Huỷ</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
